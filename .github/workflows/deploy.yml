name: Deploy to Home Server

on:
  push:
    branches:
      - main

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend_changed: ${{ steps.changes.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -qE '^(backend|frontend)/'; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.backend_changed == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/plabrum/stonks:latest

  deploy:
    name: Deploy to walter
    runs-on: ubuntu-latest
    needs: [detect-changes, build]
    if: always() && needs.detect-changes.result == 'success' && (needs.build.result == 'success' || needs.build.result == 'skipped')

    steps:
      - name: Connect to Tailscale
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list | sudo tee /etc/apt/sources.list.d/tailscale.list
          sudo apt-get update -qq && sudo apt-get install -y tailscale
          sudo tailscale up \
            --client-id="${TS_OAUTH_CLIENT_ID}" \
            --client-secret="${TS_OAUTH_SECRET}" \
            --advertise-tags=tag:ci \
            --hostname=github-actions

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: walter
          username: phil
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose -f /home/phil/repos/stonks/docker-compose.yaml pull
            docker compose -f /home/phil/repos/stonks/docker-compose.yaml up -d
