name: Deploy to Home Server

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/plabrum/stonks:latest

  deploy:
    name: Deploy to walter
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Connect to Tailscale
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_SECRET: ${{ secrets.TS_OAUTH_SECRET }}
        run: |
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.noarmor.gpg | sudo tee /usr/share/keyrings/tailscale-archive-keyring.gpg >/dev/null
          curl -fsSL https://pkgs.tailscale.com/stable/ubuntu/noble.tailscale-keyring.list | sudo tee /etc/apt/sources.list.d/tailscale.list
          sudo apt-get update -qq && sudo apt-get install -y tailscale
          ACCESS_TOKEN=$(curl -fsSL -X POST https://api.tailscale.com/api/v2/oauth/token \
            -d "client_id=${TS_OAUTH_CLIENT_ID}&client_secret=${TS_OAUTH_SECRET}&grant_type=client_credentials" \
            | jq -r .access_token)
          AUTH_KEY=$(curl -fsSL -X POST https://api.tailscale.com/api/v2/authkeys \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":true,"preauthorized":true,"tags":["tag:ci"]}}},"expirySeconds":300}' \
            | jq -r .key)
          sudo tailscale up --authkey="${AUTH_KEY}" --ephemeral --hostname=github-actions

      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: walter
          username: phil
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker compose -f ~/repos/stonks/docker-compose.yaml pull
            docker compose -f ~/repos/stonks/docker-compose.yaml up -d
