repos:
  # Ruff for backend linting and formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
      - id: ruff
        files: ^backend/.*\.py$
        args: [--fix]
      - id: ruff-format
        files: ^backend/.*\.py$

  # basedpyright for backend type checking
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright (local)
        language: system
        entry: bash -lc 'cd backend && uv run basedpyright'
        files: ^backend/.*\.py$
        pass_filenames: false

  # ESLint for frontend
  - repo: local
    hooks:
      - id: eslint-frontend
        name: ESLint (frontend)
        language: system
        entry: bash -lc 'cd frontend && npm run lint:fix --'
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        exclude: ^frontend/(node_modules|dist)/
        pass_filenames: false
